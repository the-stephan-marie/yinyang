<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        var path = location.pathname;
        if (!path.endsWith("/")) {
          var lastSeg = path.slice(path.lastIndexOf("/") + 1);
          path =
            lastSeg.indexOf(".") >= 0
              ? path.slice(0, path.lastIndexOf("/") + 1)
              : path + "/";
        }
        var href = location.origin + path;
        if (!href.endsWith("/")) href += "/";
        var b = document.createElement("base");
        b.href = href;
        var charset = document.querySelector("meta[charset]");
        if (charset) document.head.insertBefore(b, charset.nextSibling);
        else document.head.insertBefore(b, document.head.firstChild);
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>The Alchemist's Debt — WebAR</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
      }

      /* Overlay UI */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(1200px 800px at 50% 20%, rgba(25, 18, 5, 0.72), rgba(0, 0, 0, 0.92));
        color: rgba(255, 255, 255, 0.92);
        z-index: 9999;
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
        text-align: center;
      }

      #overlay.hidden {
        display: none;
      }

      .title {
        font-size: 16px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.85;
        margin-bottom: 8px;
      }

      .status {
        font-size: 18px;
        line-height: 1.35;
        max-width: 34ch;
        margin: 0 0 16px;
      }

      .hint {
        font-size: 13px;
        opacity: 0.75;
        line-height: 1.4;
        max-width: 42ch;
        margin: 0 0 18px;
      }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        color: #121212;
        background: linear-gradient(180deg, #f4d37a, #caa24a);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: none;
      }

      .spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.14);
        border-top-color: rgba(244, 211, 122, 0.95);
        animation: spin 0.9s linear infinite;
        margin: 0 0 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Full-viewport scene (MindAR examples use non-embedded fullscreen) */
      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        display: block !important;
      }
    </style>
  </head>

  <body>
    <div id="overlay" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <div class="title">The Alchemist's Debt</div>
      <p id="status" class="status">Preparing camera…</p>
      <p id="hint" class="hint">
        Point your camera at the QR/image marker. If prompted, allow camera access.
      </p>
      <div class="row">
        <button id="startBtn" type="button">Enable camera</button>
        <button id="retryBtn" type="button" class="secondary" style="display: none">Retry</button>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: false; uiLoading: false; uiError: false;"
      color-space="sRGB"
      xr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true;"
    >
      <a-assets timeout="20000">
        <a-asset-item id="yinyangRockModel" src="./yinyang+rock.glb"></a-asset-item>
      </a-assets>

      <!-- Camera -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Lighting tuned for metallic/gold highlights -->
      <a-entity light="type: ambient; intensity: 0.75; color: #fff3d6"></a-entity>
      <a-entity
        light="type: directional; intensity: 1.25; color: #ffffff; castShadow: false"
        position="1.2 2.4 1.1"
      ></a-entity>
      <a-entity
        light="type: directional; intensity: 0.45; color: #ffd38a; castShadow: false"
        position="-1.8 1.4 0.2"
      ></a-entity>

      <!-- Anchor content to image target 0 -->
      <a-entity id="targetRoot" mindar-image-target="targetIndex: 0">
        <a-entity
          id="sproutModel"
          gltf-model="#yinyangRockModel"
          position="0 0 0"
          rotation="0 0 0"
          scale="0 0 0"
          animation__sprout="property: scale; from: 0 0 0; to: 1 1 1; dur: 3000; easing: easeOutCubic; autoplay: false; startEvents: startSprout;"
        ></a-entity>
      </a-entity>
    </a-scene>

    <script>
      (function () {
        const overlay = document.getElementById("overlay");
        const statusEl = document.getElementById("status");
        const hintEl = document.getElementById("hint");
        const startBtn = document.getElementById("startBtn");
        const retryBtn = document.getElementById("retryBtn");

        const sceneEl = document.querySelector("a-scene");
        const targetRoot = document.getElementById("targetRoot");
        const sproutModel = document.getElementById("sproutModel");

        let started = false;
        let hasFound = false;
        let startTimeoutId = null;
        let arReady = false;

        function setStatus(text, hint) {
          statusEl.textContent = text;
          if (typeof hint === "string") hintEl.textContent = hint;
        }

        function showRetry(show) {
          retryBtn.style.display = show ? "inline-flex" : "none";
        }

        function hideOverlay() {
          overlay.classList.add("hidden");
        }

        function showOverlay() {
          overlay.classList.remove("hidden");
        }

        async function startAR() {
          if (started) return;
          started = true;
          showRetry(false);
          startBtn.disabled = true;
          startBtn.textContent = "Starting…";
          setStatus(
            "Requesting camera access…",
            "If you’re prompted, tap Allow. If you opened this inside Instagram/TikTok/etc, switch to Safari/Chrome."
          );

          const tryStart = async () => {
            try {
              const comp = sceneEl.components && sceneEl.components["mindar-image"];
              if (comp && typeof comp.start === "function") {
                await comp.start();
                return true;
              }
              const sys = sceneEl.systems && sceneEl.systems["mindar-image-system"];
              if (sys && typeof sys.start === "function") {
                await sys.start();
                return true;
              }
              throw new Error("MindAR start method not available yet.");
            } catch (e) {
              throw e;
            }
          };

          const fail = (e) => {
            started = false;
            arReady = false;
            if (startTimeoutId) {
              window.clearTimeout(startTimeoutId);
              startTimeoutId = null;
            }
            startBtn.disabled = false;
            startBtn.textContent = "Enable camera";
            showRetry(true);
            showOverlay();
            setStatus(
              "Camera didn’t start.",
              "Check: camera permission is allowed for this site, you’re not in an in-app browser, and no other app is using the camera. Then tap Retry."
            );
            if (e) console.error(e);
          };

          if (startTimeoutId) window.clearTimeout(startTimeoutId);
          startTimeoutId = window.setTimeout(() => {
            if (!arReady) fail(new Error("Timed out waiting for arReady"));
          }, 8000);

          try {
            if (sceneEl.hasLoaded) {
              await tryStart();
            } else {
              await new Promise((resolve, reject) => {
                sceneEl.addEventListener(
                  "loaded",
                  async () => {
                    try {
                      await tryStart();
                      resolve();
                    } catch (e) {
                      reject(e);
                    }
                  },
                  { once: true }
                );
              });
            }
          } catch (e) {
            fail(e);
          }
        }

        startBtn.addEventListener("click", startAR);
        retryBtn.addEventListener("click", () => {
          started = false;
          arReady = false;
          showOverlay();
          startAR();
        });

        // Scene lifecycle events
        sceneEl.addEventListener("arReady", () => {
          arReady = true;
          if (startTimeoutId) {
            window.clearTimeout(startTimeoutId);
            startTimeoutId = null;
          }
          hideOverlay();
        });

        sceneEl.addEventListener("arError", (e) => {
          started = false;
          arReady = false;
          if (startTimeoutId) {
            window.clearTimeout(startTimeoutId);
            startTimeoutId = null;
          }
          startBtn.disabled = false;
          startBtn.textContent = "Enable camera";
          showRetry(true);
          showOverlay();
          const msg =
            (e && e.detail && (e.detail.message || e.detail.error)) ||
            "Camera failed to start.";
          setStatus(
            "Camera unavailable.",
            "If you denied permission, re-enable it in browser/site settings. Also avoid in-app browsers. Then tap Retry."
          );
          console.error("MindAR arError:", msg, e);
        });

        // Marker events
        targetRoot.addEventListener("targetFound", () => {
          if (!hasFound) {
            hasFound = true;
            hideOverlay();
            sproutModel.emit("startSprout");
          } else {
            hideOverlay();
          }
        });

        targetRoot.addEventListener("targetLost", () => {
          // Keep the model visible once revealed for a more “residency-installation” feel.
          // If you prefer it to hide when lost, uncomment:
          // showOverlay();
        });

        // Initial UI state
        showOverlay();
        setStatus("Ready to scan.", "Tap Enable camera, then point at the marker.");
      })();
    </script>
  </body>
</html>
